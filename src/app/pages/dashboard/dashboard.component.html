<div class="space-y-6">
    <div class="flex items-center justify-between">
        <h1 class="text-2xl font-bold text-white">Dashboard</h1>
        <span class="px-3 py-1 bg-primary-500/20 text-primary-400 rounded-full text-sm border border-primary-500/30">
            Overview
        </span>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
        <!-- Stats Cards -->
        <div class="bg-slate-800/50 p-6 rounded-2xl border border-primary-500/20 backdrop-blur-sm">
            <div class="flex items-center gap-4">
                <div class="p-3 bg-green-500/20 rounded-xl text-green-400">
                    <span class="material-icons">attach_money</span>
                </div>
                <div>
                    <p class="text-sm text-gray-400">Total Sales</p>
                    <p class="text-2xl font-bold text-white">$12,450</p>
                </div>
            </div>
        </div>

        <div class="bg-slate-800/50 p-6 rounded-2xl border border-primary-500/20 backdrop-blur-sm">
            <div class="flex items-center gap-4">
                <div class="p-3 bg-blue-500/20 rounded-xl text-blue-400">
                    <span class="material-icons">receipt_long</span>
                </div>
                <div>
                    <p class="text-sm text-gray-400">Active Orders</p>
                    <p class="text-2xl font-bold text-white">24</p>
                </div>
            </div>
        </div>

        <div class="bg-slate-800/50 p-6 rounded-2xl border border-primary-500/20 backdrop-blur-sm">
            <div class="flex items-center gap-4">
                <div class="p-3 bg-orange-500/20 rounded-xl text-orange-400">
                    <span class="material-icons">table_restaurant</span>
                </div>
                <div>
                    <p class="text-sm text-gray-400">Occupied Tables</p>
                    <p class="text-2xl font-bold text-white">18/45</p>
                </div>
            </div>
        </div>

        <div class="bg-slate-800/50 p-6 rounded-2xl border border-primary-500/20 backdrop-blur-sm">
            <div class="flex items-center gap-4">
                <div class="p-3 bg-purple-500/20 rounded-xl text-purple-400">
                    <span class="material-icons">people</span>
                </div>
                <div>
                    <p class="text-sm text-gray-400">Staff Active</p>
                    <p class="text-2xl font-bold text-white">8</p>
                </div>
            </div>
        </div>
    </div>

    <div>
        <h2 class="text-lg font-semibold text-white mb-4">Quick Actions</h2>
        <app-grid-tool [actions]="dashboardActions()"></app-grid-tool>
    </div>
</div>
